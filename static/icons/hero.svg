<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <circle cx="400" cy="65" r="110" fill="#eff6ff" opacity="0.9"/>
  <circle cx="75" cy="275" r="65" fill="#dbeafe" opacity="0.5"/>

  <!-- Main dashboard card -->
  <rect x="30" y="28" width="290" height="210" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- KPI row inside card -->
  <rect x="46" y="46" width="78" height="44" rx="7" fill="#eff6ff"/>
  <rect x="134" y="46" width="78" height="44" rx="7" fill="#f0fdf4"/>
  <rect x="222" y="46" width="78" height="44" rx="7" fill="#fff7ed"/>
  <!-- KPI values (bar) -->
  <rect x="58" y="62" width="40" height="6" rx="3" fill="#93c5fd"/>
  <rect x="58" y="72" width="24" height="4" rx="2" fill="#bfdbfe"/>
  <rect x="146" y="62" width="40" height="6" rx="3" fill="#6ee7b7"/>
  <rect x="146" y="72" width="28" height="4" rx="2" fill="#a7f3d0"/>
  <rect x="234" y="62" width="40" height="6" rx="3" fill="#fca5a5"/>
  <rect x="234" y="72" width="20" height="4" rx="2" fill="#fecaca"/>

  <!-- Chart axes -->
  <line x1="55" y1="215" x2="55" y2="108" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="55" y1="215" x2="304" y2="215" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Grid -->
  <line x1="55" y1="180" x2="304" y2="180" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="55" y1="155" x2="304" y2="155" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="55" y1="130" x2="304" y2="130" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Area fill -->
  <path d="M70,200 L110,183 L152,188 L192,160 L232,170 L270,145 L302,128 L302,215 L70,215 Z" fill="#1a56db" opacity="0.07"/>
  <!-- Chart line -->
  <polyline points="70,200 110,183 152,188 192,160 232,170 270,145 302,128" stroke="#1a56db" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots -->
  <circle cx="70" cy="200" r="4" fill="white" stroke="#1a56db" stroke-width="2"/>
  <circle cx="152" cy="188" r="4" fill="white" stroke="#1a56db" stroke-width="2"/>
  <circle cx="232" cy="170" r="4" fill="white" stroke="#1a56db" stroke-width="2"/>
  <circle cx="302" cy="128" r="5" fill="#1a56db"/>

  <!-- Floating side panel -->
  <rect x="338" y="74" width="130" height="180" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="352" y="92" width="100" height="7" rx="3.5" fill="#e2e8f0"/>
  <rect x="352" y="108" width="65" height="7" rx="3.5" fill="#bfdbfe"/>
  <rect x="352" y="132" width="100" height="7" rx="3.5" fill="#e2e8f0"/>
  <rect x="352" y="148" width="75" height="7" rx="3.5" fill="#bfdbfe"/>
  <rect x="352" y="172" width="100" height="7" rx="3.5" fill="#e2e8f0"/>
  <rect x="352" y="188" width="50" height="7" rx="3.5" fill="#bfdbfe"/>
  <!-- Progress bar -->
  <rect x="352" y="214" width="100" height="9" rx="4.5" fill="#f1f5f9"/>
  <rect x="352" y="214" width="75" height="9" rx="4.5" fill="#1a56db"/>

  <!-- Book stack at bottom left -->
  <rect x="70" y="270" width="150" height="13" rx="3" fill="#1a56db"/>
  <rect x="86" y="255" width="130" height="13" rx="3" fill="#3b82f6"/>
  <rect x="102" y="240" width="110" height="13" rx="3" fill="#60a5fa"/>
</svg>
